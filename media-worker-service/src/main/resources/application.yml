spring:
  application:
    name: media-worker-service

server:
  port: 8090

document:
  convert:
    # 可选：LibreOffice 安装目录（macOS 常见值 /Applications/LibreOffice.app/Contents）
    # 不配置时会按操作系统尝试默认路径（macOS/Windows/Linux）
    office-home:
    # LibreOffice 运行工作目录（目录不存在会自动创建）
    working-dir: ${java.io.tmpdir}/libreoffice-work
    # 单个转换任务最大执行时间（毫秒）
    task-execution-timeout: 120000
    # 转换任务最大排队等待时间（毫秒）
    task-queue-timeout: 30000

logging:
  level:
    # macOS 下 LibreOffice 会向 stderr 输出非致命系统提示，避免污染 ERROR 日志
    org.jodconverter.local.office.VerboseProcess: OFF
